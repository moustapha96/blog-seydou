# Frontend React (Vite build)
# Domaine : https://blog.tech-xuma.com
#
# Installation :
#   sudo cp deploy/nginx/blog.tech-xuma.com.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/blog.tech-xuma.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Build frontend (sur le serveur ou en CI) :
#   cd frontend && npm ci && npm run build
#   # VITE_API_URL=https://backend-blog.tech-xuma.com

include /etc/nginx/snippets/upstream-api.conf;

# Redirection HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name blog.tech-xuma.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name blog.tech-xuma.com;

    # Chemin du build Vite (adapter si necessaire)
    root /var/www/blog-seydou/frontend/dist;
    index index.html;

    include /etc/nginx/snippets/security-headers.conf;
    include /etc/nginx/snippets/gzip.conf;

    # Copier deploy/nginx/snippets/*.conf vers /etc/nginx/snippets/ sur le serveur
    # ou ajuster les chemins include ci-dessous :
    ssl_certificate     /etc/letsencrypt/live/blog.tech-xuma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.tech-xuma.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:BLOG_SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 12M;

    access_log /var/log/nginx/blog.tech-xuma.com.access.log;
    error_log  /var/log/nginx/blog.tech-xuma.com.error.log warn;

    # Flux RSS servi par l'API (lien /rss.xml dans le footer)
    location = /rss.xml {
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://blog_seydou_api;
    }

    # Assets Vite — cache long
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(ico|svg|webp|jpg|jpeg|png|gif|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA React — toutes les routes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Pas d'acces aux fichiers caches / sensibles
    location ~ /\. {
        deny all;
    }
}
