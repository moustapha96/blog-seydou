# Frontend React — blog.tech-xuma.com
# Build : cd frontend && npm run build  (VITE_API_URL=https://backend-blog.tech-xuma.com)

server {
    listen 80;
    listen [::]:80;
    server_name blog.tech-xuma.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name blog.tech-xuma.com;

    root /var/www/blog-seydou/frontend/dist;
    index index.html;

    # Meme certificat que certbot (SAN : blog + backend-blog)
    ssl_certificate     /etc/letsencrypt/live/blog.tech-xuma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.tech-xuma.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    access_log /var/log/nginx/blog.tech-xuma.com.access.log;
    error_log  /var/log/nginx/blog.tech-xuma.com.error.log warn;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # RSS via l'API
    location = /rss.xml {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
