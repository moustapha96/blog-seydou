# Configuration minimale pour generer les certificats Let's Encrypt
# Domaines:
# - blog.tech-xuma.com
# - backend-blog.tech-xuma.com
#
# Usage rapide:
# 1) sudo mkdir -p /var/www/certbot
# 2) sudo cp deploy/nginx/certbot-minimal.conf /etc/nginx/sites-available/certbot-minimal.conf
# 3) sudo ln -sf /etc/nginx/sites-available/certbot-minimal.conf /etc/nginx/sites-enabled/certbot-minimal.conf
# 4) sudo nginx -t && sudo systemctl reload nginx
# 5) sudo certbot certonly --webroot -w /var/www/certbot -d blog.tech-xuma.com -d backend-blog.tech-xuma.com

server {
    listen 80;
    listen [::]:80;
    server_name blog.tech-xuma.com backend-blog.tech-xuma.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 200 "Certbot validation server is ready\n";
        add_header Content-Type text/plain;
    }
}
