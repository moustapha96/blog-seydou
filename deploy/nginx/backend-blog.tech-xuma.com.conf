# API REST Node.js (PM2 sur port 5000)
# Domaine : https://backend-blog.tech-xuma.com
#
# Installation :
#   sudo cp deploy/nginx/backend-blog.tech-xuma.com.conf /etc/nginx/sites-available/
#   sudo ln -sf /etc/nginx/sites-available/backend-blog.tech-xuma.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# PM2 :
#   pm2 start deploy/ecosystem.config.cjs --env production

include /etc/nginx/snippets/upstream-api.conf;

server {
    listen 80;
    listen [::]:80;
    server_name backend-blog.tech-xuma.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name backend-blog.tech-xuma.com;

    include /etc/nginx/snippets/security-headers.conf;
    include /etc/nginx/snippets/gzip.conf;

    ssl_certificate     /etc/letsencrypt/live/backend-blog.tech-xuma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backend-blog.tech-xuma.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:API_SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Uploads images / PDF / videos (MAX_FILE_SIZE backend = 10 Mo par defaut)
    client_max_body_size 15M;

    access_log /var/log/nginx/backend-blog.tech-xuma.com.access.log;
    error_log  /var/log/nginx/backend-blog.tech-xuma.com.error.log warn;

    # Fichiers uploades (servis par Express : /uploads)
    location /uploads/ {
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://blog_seydou_api;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Documentation Swagger
    location /api/docs {
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://blog_seydou_api;
    }

    location /api/docs.json {
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://blog_seydou_api;
    }

    # Flux RSS (acces direct aussi depuis ce domaine)
    location = /rss.xml {
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://blog_seydou_api;
    }

    # Toute l'API + racine JSON
    location / {
        include /etc/nginx/snippets/proxy-api.conf;
        proxy_pass http://blog_seydou_api;
    }

    location ~ /\. {
        deny all;
    }
}
