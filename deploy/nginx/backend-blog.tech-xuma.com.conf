# Configuration Nginx SIMPLE (sans snippets)
# Backend API: backend-blog.tech-xuma.com
# PM2 backend sur le port 5000 (127.0.0.1:5000)

server {
    listen 80;
    listen [::]:80;
    server_name backend-blog.tech-xuma.com;

    # Necessaire pour certbot (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirection HTTP -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name backend-blog.tech-xuma.com;

    # Meme certificat SAN (genere avec les 2 domaines)
    ssl_certificate     /etc/letsencrypt/live/blog.tech-xuma.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.tech-xuma.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_prefer_server_ciphers off;

    # Limite upload (backend accepte 10MB par defaut)
    client_max_body_size 15M;

    access_log /var/log/nginx/backend-blog.tech-xuma.com.access.log;
    error_log  /var/log/nginx/backend-blog.tech-xuma.com.error.log warn;

    # Securite minimale
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Reverse proxy vers PM2/Node (PORT 5000)
    location / {
        proxy_pass http://127.0.0.1:6000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Bloque les fichiers caches
    location ~ /\. {
        deny all;
    }
}
